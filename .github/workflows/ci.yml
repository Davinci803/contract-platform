name: contract-platform-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build backend with coverage gate
        run: mvn -f backend/pom.xml clean verify
      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/**/target/surefire-reports/**
            backend/**/target/site/jacoco/**
          if-no-files-found: warn

  backend-integration-e2e:
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run integration and E2E tests
        run: mvn -f backend/pom.xml -pl api test "-Dtest=*IntegrationTest,*E2EIntegrationTest"
      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-reports
          path: |
            backend/api/target/surefire-reports/**
            backend/api/target/site/jacoco/**
          if-no-files-found: warn

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
