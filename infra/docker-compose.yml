services:
  postgres:
    image: postgres:16
    container_name: contract-platform-postgres
    environment:
      POSTGRES_DB: contracts
      POSTGRES_USER: contracts
      POSTGRES_PASSWORD: contracts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contracts -d contracts"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: zookeeper:3.9
    container_name: contract-platform-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_4LW_COMMANDS_WHITELIST: ruok,mntr,conf,isro

  kafka:
    image: redpandadata/redpanda:v24.1.8
    container_name: contract-platform-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
      - --schema-registry-addr
      - 0.0.0.0:8081
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - kafka:33145
    environment:
      REDPANDA_AUTO_CREATE_TOPICS_ENABLED: "true"

  schema-registry:
    image: nginx:alpine
    container_name: contract-platform-schema-registry
    depends_on:
      - kafka
    ports:
      - "8085:8085"
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' > /etc/nginx/conf.d/default.conf
        server {
          listen 8085;
          location / {
            proxy_pass http://kafka:8081;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
          }
        }
        EOF
        nginx -g "daemon off;"

  nexus:
    image: sonatype/nexus3:3.72.0
    container_name: contract-platform-nexus
    ports:
      - "8081:8081"
    volumes:
      - nexus_data:/nexus-data

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: contract-platform-api
    depends_on:
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_started
      nexus:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/contracts
      DB_USER: contracts
      DB_PASSWORD: contracts
      NEXUS_BASE_URL: http://nexus:8081
      NEXUS_REPOSITORY: maven-releases
      NEXUS_USERNAME: admin
      NEXUS_PASSWORD: admin123
      SCHEMA_REGISTRY_URL: http://schema-registry:8085
      SCHEMA_REGISTRY_USERNAME: ""
      SCHEMA_REGISTRY_PASSWORD: ""
      SCHEMA_REGISTRY_COMPATIBILITY: BACKWARD
      SCHEMA_REGISTRY_SCHEMA_TYPE: AVRO
      SCHEMA_REGISTRY_SUBJECT_SUFFIX: value
      SECURITY_ADMIN_USERNAME: admin
      SECURITY_ADMIN_PASSWORD: admin123
      SECURITY_DEVELOPER_USERNAME: developer
      SECURITY_DEVELOPER_PASSWORD: dev123
      SECURITY_VIEWER_USERNAME: viewer
      SECURITY_VIEWER_PASSWORD: view123
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_API_USERNAME: developer
        VITE_API_PASSWORD: dev123
    container_name: contract-platform-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  nexus_data:
