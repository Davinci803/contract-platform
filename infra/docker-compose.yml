services:
  postgres:
    image: postgres:16
    container_name: contract-platform-postgres
    environment:
      POSTGRES_DB: contracts
      POSTGRES_USER: contracts
      POSTGRES_PASSWORD: contracts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: zookeeper:3.9
    container_name: contract-platform-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_4LW_COMMANDS_WHITELIST: ruok,mntr,conf,isro

  kafka:
    image: redpandadata/redpanda:v24.1.8
    container_name: contract-platform-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
      - --schema-registry-addr
      - 0.0.0.0:8081
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - kafka:33145
    environment:
      REDPANDA_AUTO_CREATE_TOPICS_ENABLED: "true"

  schema-registry:
    image: nginx:alpine
    container_name: contract-platform-schema-registry
    depends_on:
      - kafka
    ports:
      - "8085:8085"
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' > /etc/nginx/conf.d/default.conf
        server {
          listen 8085;
          location / {
            proxy_pass http://kafka:8081;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
          }
        }
        EOF
        nginx -g "daemon off;"

  nexus:
    image: sonatype/nexus3:3.72.0
    container_name: contract-platform-nexus
    ports:
      - "8081:8081"
    volumes:
      - nexus_data:/nexus-data

volumes:
  postgres_data:
  nexus_data:
